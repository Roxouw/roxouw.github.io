root = true

# padrão geral
[*]
charset = utf-8
end_of_line = lf
insert_final_newline = true
trim_trailing_whitespace = true

# código (js, css, html)
[*.{js,ts,jsx,tsx,css,html}]
indent_style = space
indent_size = 2

# arquivos markdown (evita quebrar formatação)
[*.md]
trim_trailing_whitespace = false

# json
[*.json]
indent_style = space
indent_size = 2